<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paraíso del Libro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
<body>

<header>
  <!-- CHILD 1: Pushed to the Left -->
  <div class="logo-container">
    <a href="https://paraisodellibro.net">
      <img src="./images/banners/Vertical_slogan/logo_azul.PNG" alt="Logo">
    </a>
  </div>

  <!-- CHILD 2: Pushed to the Right -->
  <nav class="main-nav">
    <a href="./index.html" class="nav-item">
      <i class="fas fa-book-open"></i> <span>Catálogo</span>
    </a>
    <a href="./pedido.html" class="nav-item nav-cta">
      <i class="fas fa-shopping-cart"></i><span>Hacer Pedido</span>
    </a>
    <a href="./politicas.html" class="nav-item">
      <i class="fas fa-file-contract"></i><span>Políticas</span>
    </a>
  </nav>
</header>

<section class="filtros">
  <div class="filter-container">
    <button class="filter-btn active" onclick="filtrar('todos')">
      <i class="fas fa-th-large"></i> Todos
    </button>
    <button class="filter-btn" onclick="filtrar('Literatura')">
      <i class="fas fa-book"></i> Literatura
    </button>
    <button class="filter-btn" onclick="filtrar('SuperacionPersonal')">
      <i class="fas fa-seedling"></i> Superación
    </button>
    <button class="filter-btn" onclick="filtrar('Educativos')">
      <i class="fas fa-graduation-cap"></i> Educativo
    </button>
    <button class="filter-btn" onclick="filtrar('AutoAprendizaje')">
      <i class="fas fa-lightbulb"></i> Autoaprendizaje
    </button>
    <button class="filter-btn" onclick="filtrar('EstiloVida')">
      <i class="fas fa-heartbeat"></i> Estilo de Vida
    </button>
    <button class="filter-btn btn-sale" onclick="filtrar('Oferta')">
      <i class="fas fa-tag"></i> Oferta
    </button>

    <div class="search-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="buscador" placeholder="Buscar libro..." onkeyup="buscar()">
    </div>
  </div>
</section>

<section id="catalogo" class="catalogo"></section>

<!-- Script al final y con ruta relativa -->
<script src="./js/app.js"></script>
<!-- VISTA PREVIA MODAL -->
<div id="modalLibro" class="modal" onclick="clickFuera(event)">
  <div class="modal-contenido">
    <span class="cerrar" onclick="cerrarVistaPrevia()">&times;</span>
    <img id="modalImagen" src="">
    <h2 id="modalTitulo"></h2>
    <p id="modalAutor"></p>
    <p id="modalCategoria"></p>
    <h3 id="modalPrecio"></h3>
    <div id="modalUso" class="estado-tag"></div>

  <!-- Nuevo botón de compra -->
  <a id="btnComprarWhatsapp" href="#" target="_blank" class="btn-whatsapp">
    Comprar por WhatsApp
  </a>

  </div>
</div>
<footer class="main-footer">
  <div class="footer-container">
    <!-- Centered Title -->
        <div class="footer-logo">
      <img style="height: 100;width: 100;" src="./images/banners/Vertical_slogan/logo_azul.PNG" alt="Logo Paraíso del Libro">
    </div>    
    <!-- Centered Social Icons 
    <div class="footer-social">
      <a href="https://facebook.com" target="_blank" class="social-link" title="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>
      <a href="https://wa.me" target="_blank" class="social-link wa-link" title="WhatsApp">
        <i class="fab fa-whatsapp"></i>
      </a>
    </div>-->

    <!-- Copyright Info -->
    <div class="footer-copy">
      <p>© 2026 <strong>Paraiso del Libro</strong>. Paraíso, Cartago - Costa Rica. Tel <a href="" style="color: aliceblue;">+506 72679082</a></p>
    </div>
  </div>
</footer>

</body>


</html>
